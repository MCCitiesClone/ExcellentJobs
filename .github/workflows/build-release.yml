name: Build & Release

on:
  push:
    branches: [ master ]

# Allow the workflow to push the version bump commit/tag and create releases.
permissions:
  contents: write

concurrency:
  group: build-release
  cancel-in-progress: false

jobs:
  build-release:
    runs-on: ubuntu-latest
    # Skip runs triggered by the automated version-bump commit to avoid loops.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          echo "Current version: $CURRENT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW"
          mvn -B -q versions:set -DnewVersion="$NEW" -DgenerateBackupPoms=false
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

      - name: Build jar
        run: mvn -B package

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git commit -m "chore: bump version to ${{ steps.bump.outputs.version }} [skip ci]"
          git push

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.bump.outputs.version }}" \
            target/ExcellentJobs-${{ steps.bump.outputs.version }}.jar \
            --title "v${{ steps.bump.outputs.version }}" \
            --generate-notes \
            --target "$(git rev-parse HEAD)"
